<svg xmlns="http://www.w3.org/2000/svg" width="320" height="90" viewBox="0 0 320 90">
  <defs>
    <clipPath id="plate-clip">
      <rect x="2" y="2" width="316" height="86" rx="5" ry="5"/>
    </clipPath>
  </defs>

  <!-- White plate background -->
  <rect x="2" y="2" width="316" height="86" rx="5" ry="5" fill="white"/>

  <!-- Blue EØS strip -->
  <rect x="2" y="2" width="50" height="86" fill="#003399" clip-path="url(#plate-clip)"/>

  <!-- EU stars: 12 yellow dots in a circle, centre (27, 36), radius 13 -->
  <circle cx="27"   cy="23"   r="2.5" fill="#FFCC00"/>
  <circle cx="33.5" cy="24.6" r="2.5" fill="#FFCC00"/>
  <circle cx="38.3" cy="29.5" r="2.5" fill="#FFCC00"/>
  <circle cx="40"   cy="36"   r="2.5" fill="#FFCC00"/>
  <circle cx="38.3" cy="42.5" r="2.5" fill="#FFCC00"/>
  <circle cx="33.5" cy="47.4" r="2.5" fill="#FFCC00"/>
  <circle cx="27"   cy="49"   r="2.5" fill="#FFCC00"/>
  <circle cx="20.5" cy="47.4" r="2.5" fill="#FFCC00"/>
  <circle cx="15.7" cy="42.5" r="2.5" fill="#FFCC00"/>
  <circle cx="14"   cy="36"   r="2.5" fill="#FFCC00"/>
  <circle cx="15.7" cy="29.5" r="2.5" fill="#FFCC00"/>
  <circle cx="20.5" cy="24.6" r="2.5" fill="#FFCC00"/>

  <!-- Country code -->
  <text x="27" y="73" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">N</text>

  <!-- Registration number -->
  <text x="186" y="63" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="black" text-anchor="middle" letter-spacing="2">AB 12345</text>

  <!-- Border -->
  <rect x="2" y="2" width="316" height="86" rx="5" ry="5" fill="none" stroke="#333" stroke-width="3"/>
</svg>
